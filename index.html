<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Superhot - Office Infiltration</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fff; font-family: 'Courier New', Courier, monospace; }
        #overlay { position: absolute; width: 100%; height: 100%; background: rgba(255,255,255,0.9); 
                   display: flex; flex-direction: column; align-items: center; justify-content: center; 
                   color: black; cursor: pointer; z-index: 100; text-transform: uppercase; }
        #ui { position: absolute; top: 20px; left: 20px; color: #000; font-size: 24px; font-weight: bold; z-index: 10; }
        #health-bar { position: absolute; bottom: 20px; left: 20px; width: 200px; height: 10px; border: 2px solid #f00; z-index: 10; }
        #health-fill { width: 100%; height: 100%; background: #f00; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; 
                     border: 2px solid #000; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color:red; font-size: 60px; margin: 0;">SUPERHOT</h1>
        <p><b>OFFICE LEVEL</b></p>
        <p>CLICK TO START</p>
    </div>
    
    <div id="ui">KILLS: <span id="score">0</span></div>
    <div id="health-bar"><div id="health-fill"></div></div>
    <div id="crosshair"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

    <script>
        window.onload = () => {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const controls = new THREE.PointerLockControls(camera, document.body);
            document.getElementById('overlay').addEventListener('click', () => controls.lock());
            controls.addEventListener('lock', () => document.getElementById('overlay').style.display = 'none');
            controls.addEventListener('unlock', () => document.getElementById('overlay').style.display = 'flex');

            scene.add(new THREE.AmbientLight(0xffffff, 0.9));

            // BUILDING THE ROOMS (Walls)
            const wallMat = new THREE.MeshStandardMaterial({color: 0xeeeeee});
            function createWall(x, z, w, d) {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(w, 5, d), wallMat);
                wall.position.set(x, 2.5, z);
                scene.add(wall);
                return wall;
            }

            // Simple Office Layout
            createWall(0, -10, 20, 1);  // Back wall
            createWall(10, 0, 1, 20);   // Right wall
            createWall(-10, 0, 1, 20);  // Left wall
            createWall(0, 10, 8, 1);    // Front wall left
            createWall(7, 10, 6, 1);    // Front wall right (door in middle)
            
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshPhongMaterial({ color: 0xffffff }));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            let playerBullets = [], enemyBullets = [], npcs = [];
            let health = 100, score = 0, isShooting = false;
            let keys = { w: false, a: false, s: false, d: false };

            // HUMANOID ENEMY FACTORY
            function spawnHumanoid() {
                const group = new THREE.Group();
                const mat = new THREE.MeshStandardMaterial({color: 0xff0000});
                
                // Torso
                const torso = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.8, 0.3), mat);
                torso.position.y = 1.2;
                group.add(torso);
                
                // Head
                const head = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), mat);
                head.position.y = 1.8;
                group.add(head);

                // Arms
                const armL = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.6, 0.15), mat);
                armL.position.set(-0.35, 1.2, 0);
                group.add(armL);
                const armR = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.6, 0.15), mat);
                armR.position.set(0.35, 1.2, 0);
                group.add(armR);

                group.position.set((Math.random()-0.5)*15, 0, (Math.random()-0.5)*15);
                group.userData = { shootCooldown: Math.random() * 100 };
                scene.add(group);
                npcs.push(group);
            }
            for(let i=0; i<4; i++) spawnHumanoid();

            function createBullet(pos, targetPos, color) {
                const b = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshBasicMaterial({color: color}));
                const trail = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.01, 1), new THREE.MeshBasicMaterial({color: color, transparent: true, opacity: 0.4}));
                trail.rotation.x = Math.PI / 2; trail.position.z = 0.5; b.add(trail);
                b.position.copy(pos); b.lookAt(targetPos);
                const dir = new THREE.Vector3().subVectors(targetPos, pos).normalize();
                b.userData = { velocity: dir.multiplyScalar(0.25) };
                scene.add(b);
                return b;
            }

            window.addEventListener('mousedown', () => {
                if (!controls.isLocked) return;
                isShooting = true; setTimeout(() => { isShooting = false; }, 150);
                const target = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).add(camera.position);
                playerBullets.push(createBullet(camera.position.clone().sub(new THREE.Vector3(0,0.2,0)), target, 0x000000));
            });

            document.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
            document.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

            function animate() {
                requestAnimationFrame(animate);
                if (controls.isLocked) {
                    const isMoving = keys.w || keys.a || keys.s || keys.d || isShooting;
                    const timeScale = isMoving ? 1.0 : 0.03;

                    if(keys.w) controls.moveForward(0.1); if(keys.s) controls.moveForward(-0.1);
                    if(keys.a) controls.moveRight(-0.08); if(keys.d) controls.moveRight(0.08);

                    // Player Bullets
                    for (let i = playerBullets.length - 1; i >= 0; i--) {
                        const b = playerBullets[i];
                        b.position.add(b.userData.velocity.clone().multiplyScalar(timeScale));
                        npcs.forEach((npc, nIdx) => {
                            if (b.position.distanceTo(npc.position.clone().add(new THREE.Vector3(0,1,0))) < 0.8) {
                                scene.remove(npc); npcs.splice(nIdx, 1);
                                scene.remove(b); playerBullets.splice(i, 1);
                                score++; document.getElementById('score').innerText = score;
                                spawnHumanoid();
                            }
                        });
                    }

                    // Enemy Bullets
                    for (let i = enemyBullets.length - 1; i >= 0; i--) {
                        const b = enemyBullets[i];
                        b.position.add(b.userData.velocity.clone().multiplyScalar(timeScale));
                        if (b.position.distanceTo(camera.position) < 0.5) {
                            health -= 34; document.getElementById('health-fill').style.width = health + '%';
                            scene.remove(b); enemyBullets.splice(i, 1);
                            if(health <= 0) { alert("SUPER... HOT..."); location.reload(); }
                        }
                    }

                    npcs.forEach(npc => {
                        npc.lookAt(camera.position.x, 0, camera.position.z);
                        npc.userData.shootCooldown += timeScale;
                        if (npc.userData.shootCooldown > 100) {
                            enemyBullets.push(createBullet(npc.position.clone().add(new THREE.Vector3(0,1.5,0)), camera.position, 0xff0000));
                            npc.userData.shootCooldown = 0;
                        }
                    });
                }
                renderer.render(scene, camera);
            }
            animate();
        };
    </script>
</body>
</html>
