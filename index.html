<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Superhot - Dodge the Bullets</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fff; font-family: 'Courier New', Courier, monospace; }
        #overlay { position: absolute; width: 100%; height: 100%; background: rgba(255,255,255,0.9); 
                   display: flex; flex-direction: column; align-items: center; justify-content: center; 
                   color: black; cursor: pointer; z-index: 100; text-transform: uppercase; }
        #ui { position: absolute; top: 20px; left: 20px; color: #000; font-size: 24px; font-weight: bold; z-index: 10; }
        #health-bar { position: absolute; bottom: 20px; left: 20px; width: 200px; height: 10px; border: 2px solid #f00; z-index: 10; }
        #health-fill { width: 100%; height: 100%; background: #f00; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; 
                     border: 2px solid #000; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color:red; font-size: 60px; margin: 0;">SUPERHOT</h1>
        <p><b>DODGE THE RED BULLETS</b></p>
        <p>CLICK TO BEGIN</p>
    </div>
    
    <div id="ui">KILLS: <span id="score">0</span></div>
    <div id="health-bar"><div id="health-fill"></div></div>
    <div id="crosshair"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

    <script>
        window.onload = () => {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const controls = new THREE.PointerLockControls(camera, document.body);
            document.getElementById('overlay').addEventListener('click', () => controls.lock());
            controls.addEventListener('lock', () => document.getElementById('overlay').style.display = 'none');
            controls.addEventListener('unlock', () => document.getElementById('overlay').style.display = 'flex');

            scene.add(new THREE.AmbientLight(0xffffff, 0.9));
            
            // Environment
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshPhongMaterial({ color: 0xeeeeee }));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Game State
            let playerBullets = [];
            let enemyBullets = [];
            let npcs = [];
            let health = 100, score = 0, isShooting = false;
            let keys = { w: false, a: false, s: false, d: false };

            function spawnNPC() {
                const npc = new THREE.Group();
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.6, 16), new THREE.MeshStandardMaterial({color: 0xff0000}));
                body.position.y = 0.8;
                npc.add(body);
                npc.position.set((Math.random()-0.5)*50, 0, (Math.random()-0.5)*50);
                npc.userData = { shootCooldown: Math.random() * 100 };
                scene.add(npc);
                npcs.push(npc);
            }
            for(let i=0; i<5; i++) spawnNPC();

            // Function to create a bullet with a trail
            function createBullet(pos, targetPos, color, isEnemy) {
                const bullet = new THREE.Mesh(
                    new THREE.SphereGeometry(0.1, 8, 8), 
                    new THREE.MeshBasicMaterial({color: color})
                );
                
                const trailGeo = new THREE.CylinderGeometry(0.05, 0.01, 1.5, 8);
                const trailMat = new THREE.MeshBasicMaterial({color: color, transparent: true, opacity: 0.5});
                const trail = new THREE.Mesh(trailGeo, trailMat);
                trail.rotation.x = Math.PI / 2;
                trail.position.z = 0.75;
                bullet.add(trail);

                bullet.position.copy(pos);
                bullet.lookAt(targetPos);
                
                const direction = new THREE.Vector3().subVectors(targetPos, pos).normalize();
                bullet.userData = { velocity: direction.multiplyScalar(0.25), isEnemy: isEnemy };
                
                scene.add(bullet);
                return bullet;
            }

            // Player Shooting
            window.addEventListener('mousedown', () => {
                if (!controls.isLocked) return;
                isShooting = true;
                setTimeout(() => { isShooting = false; }, 150);

                const target = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).add(camera.position);
                playerBullets.push(createBullet(camera.position.clone().sub(new THREE.Vector3(0,0.2,0)), target, 0x000000, false));
            });

            document.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
            document.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

            function animate() {
                requestAnimationFrame(animate);
                if (controls.isLocked) {
                    const isMoving = keys.w || keys.a || keys.s || keys.d || isShooting;
                    const timeScale = isMoving ? 1.0 : 0.02;

                    if(keys.w) controls.moveForward(0.15); 
                    if(keys.s) controls.moveForward(-0.15);
                    if(keys.a) controls.moveRight(-0.1); 
                    if(keys.d) controls.moveRight(0.1);

                    // Update Player Bullets
                    for (let i = playerBullets.length - 1; i >= 0; i--) {
                        const b = playerBullets[i];
                        b.position.add(b.userData.velocity.clone().multiplyScalar(timeScale));
                        npcs.forEach((npc, nIdx) => {
                            if (b.position.distanceTo(npc.position.clone().add(new THREE.Vector3(0,1,0))) < 1) {
                                scene.remove(npc);
                                npcs.splice(nIdx, 1);
                                scene.remove(b);
                                playerBullets.splice(i, 1);
                                score++;
                                document.getElementById('score').innerText = score;
                                spawnNPC();
                            }
                        });
                        if (b.position.length() > 100) { scene.remove(b); playerBullets.splice(i, 1); }
                    }

                    // Update Enemy Bullets (The ones you dodge!)
                    for (let i = enemyBullets.length - 1; i >= 0; i--) {
                        const b = enemyBullets[i];
                        b.position.add(b.userData.velocity.clone().multiplyScalar(timeScale));
                        
                        // Check if it hits player
                        if (b.position.distanceTo(camera.position) < 0.5) {
                            health -= 34; // 3 hits and you're out
                            document.getElementById('health-fill').style.width = health + '%';
                            scene.remove(b);
                            enemyBullets.splice(i, 1);
                            if(health <= 0) { alert("GAME OVER"); location.reload(); }
                        }
                        if (b.position.length() > 100) { scene.remove(b); enemyBullets.splice(i, 1); }
                    }

                    // Enemy Logic
                    npcs.forEach(npc => {
                        npc.lookAt(camera.position.x, 0, camera.position.z);
                        const dist = npc.position.distanceTo(camera.position);
                        
                        if (dist > 10) npc.translateZ(0.05 * timeScale);
                        
                        npc.userData.shootCooldown += timeScale;
                        if (npc.userData.shootCooldown > 120 && dist < 30) {
                            // ENEMY FIRES!
                            const spawnPos = npc.position.clone().add(new THREE.Vector3(0, 1.2, 0));
                            enemyBullets.push(createBullet(spawnPos, camera.position, 0xff0000, true));
                            npc.userData.shootCooldown = 0;
                        }
                    });
                }
                renderer.render(scene, camera);
            }
            animate();
        };
    </script>
</body>
</html>
