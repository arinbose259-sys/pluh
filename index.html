<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Superhot - Bullet Trails</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fff; font-family: 'Courier New', Courier, monospace; }
        #overlay { position: absolute; width: 100%; height: 100%; background: rgba(255,255,255,0.9); 
                   display: flex; flex-direction: column; align-items: center; justify-content: center; 
                   color: black; cursor: pointer; z-index: 100; text-transform: uppercase; }
        #ui { position: absolute; top: 20px; left: 20px; color: #000; font-size: 24px; font-weight: bold; z-index: 10; }
        #health-bar { position: absolute; bottom: 20px; left: 20px; width: 200px; height: 10px; border: 2px solid #f00; z-index: 10; }
        #health-fill { width: 100%; height: 100%; background: #f00; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; 
                     border: 2px solid #000; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color:red; font-size: 60px; margin: 0;">SUPERHOT</h1>
        <p><b>TIME MOVES WHEN YOU MOVE</b></p>
        <p>CLICK TO BEGIN</p>
    </div>
    
    <div id="ui">KILLS: <span id="score">0</span></div>
    <div id="health-bar"><div id="health-fill"></div></div>
    <div id="crosshair"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

    <script>
        window.onload = () => {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const controls = new THREE.PointerLockControls(camera, document.body);
            document.getElementById('overlay').addEventListener('click', () => controls.lock());
            controls.addEventListener('lock', () => document.getElementById('overlay').style.display = 'none');
            controls.addEventListener('unlock', () => document.getElementById('overlay').style.display = 'flex');

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 0.5);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            // World setup
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshPhongMaterial({ color: 0xeeeeee }));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            for(let i=0; i<15; i++) {
                const box = new THREE.Mesh(new THREE.BoxGeometry(2, 6, 2), new THREE.MeshStandardMaterial({color: 0xcccccc}));
                box.position.set((Math.random()-0.5)*50, 3, (Math.random()-0.5)*50);
                scene.add(box);
            }

            const gun = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 0.5), new THREE.MeshStandardMaterial({color: 0x111111}));
            gun.position.set(0.25, -0.25, -0.5);
            camera.add(gun);
            scene.add(camera);

            let bullets = [];
            let npcs = [];
            let health = 100, score = 0, isShooting = false;
            let keys = { w: false, a: false, s: false, d: false };

            function spawnNPC() {
                const npc = new THREE.Group();
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.6, 16), new THREE.MeshStandardMaterial({color: 0xff0000}));
                body.position.y = 0.8;
                npc.add(body);
                npc.position.set((Math.random()-0.5)*60, 0, (Math.random()-0.5)*60);
                npc.userData = { attackTimer: Math.random() * 50 };
                scene.add(npc);
                npcs.push(npc);
            }
            for(let i=0; i<6; i++) spawnNPC();

            // Fire Bullet with Trail
            window.addEventListener('mousedown', () => {
                if (!controls.isLocked) return;
                
                isShooting = true;
                setTimeout(() => { isShooting = false; }, 200);

                // The Bullet Head
                const bullet = new THREE.Mesh(
                    new THREE.SphereGeometry(0.08, 8, 8), 
                    new THREE.MeshBasicMaterial({color: 0xff4400})
                );
                
                // The Trail
                const trailGeo = new THREE.CylinderGeometry(0.04, 0.01, 1.5, 8);
                const trailMat = new THREE.MeshBasicMaterial({color: 0xffaa00, transparent: true, opacity: 0.6});
                const trail = new THREE.Mesh(trailGeo, trailMat);
                
                trail.rotation.x = Math.PI / 2;
                trail.position.z = 0.75; // Offset trail behind head
                bullet.add(trail);

                const direction = new THREE.Vector3(0, 0, -1);
                direction.applyQuaternion(camera.quaternion);
                
                bullet.position.copy(camera.position);
                bullet.quaternion.copy(camera.quaternion);
                
                // Velocity is MUCH slower now (0.2 instead of 0.8)
                bullet.userData = { velocity: direction.multiplyScalar(0.2) }; 
                scene.add(bullet);
                bullets.push(bullet);
            });

            document.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
            document.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

            function animate() {
                requestAnimationFrame(animate);
                if (controls.isLocked) {
                    const isMoving = keys.w || keys.a || keys.s || keys.d || isShooting;
                    const timeScale = isMoving ? 1.0 : 0.02; // Very slow when still

                    if(keys.w) controls.moveForward(0.12); 
                    if(keys.s) controls.moveForward(-0.12);
                    if(keys.a) controls.moveRight(-0.08); 
                    if(keys.d) controls.moveRight(0.08);

                    // Move Bullets
                    for (let i = bullets.length - 1; i >= 0; i--) {
                        const b = bullets[i];
                        // Apply timescale to bullet movement
                        b.position.add(b.userData.velocity.clone().multiplyScalar(timeScale));

                        // Collision with NPCs
                        npcs.forEach((npc, nIdx) => {
                            if (b.position.distanceTo(npc.position.clone().add(new THREE.Vector3(0,1,0))) < 1) {
                                scene.remove(npc);
                                npcs.splice(nIdx, 1);
                                scene.remove(b);
                                bullets.splice(i, 1);
                                score++;
                                document.getElementById('score').innerText = score;
                                spawnNPC();
                            }
                        });

                        if (b.position.length() > 80) {
                            scene.remove(b);
                            bullets.splice(i, 1);
                        }
                    }

                    npcs.forEach(npc => {
                        npc.lookAt(camera.position.x, 0, camera.position.z);
                        const dist = npc.position.distanceTo(camera.position);
                        if (dist > 3) npc.translateZ(0.04 * timeScale);
                        
                        npc.userData.attackTimer += timeScale;
                        if (npc.userData.attackTimer > 150 && dist < 15) {
                            health -= 20;
                            document.getElementById('health-fill').style.width = health + '%';
                            npc.userData.attackTimer = 0;
                            if(health <= 0) { alert("SUPER... HOT... (Score: " + score + ")"); location.reload(); }
                        }
                    });
                }
                renderer.render(scene, camera);
            }
            animate();
        };
    </script>
</body>
</html>
